<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campings · Urlaubspotter</title>
    <link rel="stylesheet" href="site.css?v=14">
    <link rel="stylesheet" href="search-navigation.css?v=8">
</head>
<body>

<header class="site-header"><div class="inner"></div></header>
<div id="hero-searchbar"></div>
<nav class="breadcrumb" id="landing-breadcrumb"></nav>
<section class="section tight" id="landing-hero"></section>

<section class="section">
    <div class="section-head">
        <div>
            <span class="eyebrow">Geselecteerde accommodaties</span>
            <h2><span id="landing-count">0</span> resultaten</h2>
        </div>
        <a class="link" id="landing-more" href="accommodaties.html">Bekijk alle →</a>
    </div>
    <div class="listing-grid" id="landing-listing" data-rail="280"></div>
</section>

<footer class="site-footer">
    <div class="footer-inner"></div>
    <div class="footer-bottom"></div>
</footer>

<script src="site-data.js?v=6"></script>
<script src="site.js?v=16"></script>
<script src="landing.js?v=3"></script>
<script src="search-navigation.js?v=8"></script>
<script>
    renderHeader('wat');
    renderFooter();
    renderSearchNavigation('hero-searchbar');
    renderLandingPage({
        kind: 'type',
        value: 'camping',
        eyebrow: 'Niveau 1 — Campings',
        title: 'Campings',
        lead: 'Van glamping tot kindercamping — kamperen voor ieder reisgezelschap.',
        breadcrumb: 'Campings'
    });
    document.querySelectorAll('[data-rail]').forEach(el => {
        const min = parseInt(el.dataset.rail, 10) || 300;
        makeHorizontalRail(el, { itemMinWidth: min });
    });
</script>
</body>
</html>
