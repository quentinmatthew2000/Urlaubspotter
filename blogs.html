<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs · Urlaubspotter</title>
    <link rel="stylesheet" href="site.css?v=14">
</head>
<body>

<header class="site-header"><div class="inner"></div></header>

<nav class="breadcrumb" id="bc">
    <a href="index.html">Home</a>
    <span class="sep">›</span>
    <span class="current">Blogs &amp; Tips</span>
</nav>

<section class="section">
    <div class="section-head">
        <div>
            <span class="eyebrow">Inspiratie</span>
            <h2>Blogs &amp; Tips</h2>
            <p class="lead">Reistips, bestemmingen en inspiratie — gegroepeerd per thema.</p>
        </div>
    </div>
    <div id="blogs-by-category"></div>
</section>

<footer class="site-footer">
    <div class="footer-inner"></div>
    <div class="footer-bottom"></div>
</footer>

<script src="site-data.js?v=5"></script>
<script src="site.js?v=15"></script>
<script>
    renderHeader('');
    renderFooter();

    // Gradient|emoji → data-URI helper (hergebruikt op blog-detail + reisverslagen)
    function bgImage(spec) {
        const m = (spec || '').match(/^gradient:([^,]+),([^|]+)\|(.+)$/);
        if (!m) return '';
        const [, c1, c2, emoji] = m;
        return `data:image/svg+xml;utf8,${encodeURIComponent(
            `<svg xmlns='http://www.w3.org/2000/svg' width='600' height='360' viewBox='0 0 600 360'>
             <defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
             <stop offset='0%' stop-color='${c1}'/><stop offset='100%' stop-color='${c2}'/>
             </linearGradient></defs>
             <rect width='600' height='360' fill='url(%23g)'/>
             <text x='300' y='230' font-size='140' text-anchor='middle' font-family='system-ui'>${emoji}</text>
             </svg>`)}`;
    }

    // Groepeer blogs per category
    const blogs = (SITE_DATA.blogs || []).slice().sort((a,b) => (b.date || '').localeCompare(a.date || ''));
    const groups = {};
    blogs.forEach(b => { (groups[b.category] = groups[b.category] || []).push(b); });

    const container = document.getElementById('blogs-by-category');
    container.innerHTML = Object.entries(groups).map(([cat, items]) => `
        <div class="blog-category-block">
            <h3 class="blog-category-title">${cat}</h3>
            <div class="blog-grid">
                ${items.map(b => `
                    <a class="blog-card" href="blog-detail.html?id=${b.id}">
                        <div class="blog-img" style="background: url('${bgImage(b.image)}') center/cover, linear-gradient(135deg,#4facfe,#00c6ff);"></div>
                        <div class="blog-body">
                            <div class="blog-tag">${b.category}</div>
                            <h3>${b.title}</h3>
                            <p>${b.intro}</p>
                        </div>
                    </a>
                `).join('')}
            </div>
        </div>
    `).join('');

    if (!blogs.length) {
        container.innerHTML = `<p style="color:var(--secondary)">Nog geen blogs beschikbaar.</p>`;
    }
</script>
<style>
    .blog-category-block { margin-bottom: 40px; }
    .blog-category-title {
        font-size: 1.25rem; font-weight: 800;
        margin: 0 0 14px;
        padding-bottom: 8px;
        border-bottom: 2px solid var(--primary-light);
        color: var(--primary);
    }
</style>
</body>
</html>
