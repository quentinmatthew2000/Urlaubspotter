<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reisverslag · Urlaubspotter</title>
    <link rel="stylesheet" href="site.css?v=14">
    <style>
        .article-wrap { max-width: 800px; margin: 0 auto; padding: 24px 20px 60px; }
        .article-hero {
            aspect-ratio: 16/8;
            border-radius: 14px;
            background-size: cover;
            background-position: center;
            margin-bottom: 24px;
        }
        .article-meta {
            color: var(--secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .article-meta .author {
            color: var(--primary);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .article-wrap h1 {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 800;
            letter-spacing: -0.01em;
            margin: 6px 0 12px;
        }
        .article-body p { font-size: 1rem; color: var(--text); line-height: 1.75; margin-bottom: 16px; }
        .article-back { display: inline-block; margin-bottom: 16px; color: var(--primary); font-weight: 700; text-decoration: none; }
        .article-back:hover { text-decoration: underline; }
        .related { margin-top: 48px; }
        .related h3 { margin-bottom: 16px; font-size: 1.2rem; }
    </style>
</head>
<body>

<header class="site-header"><div class="inner"></div></header>

<nav class="breadcrumb" id="bc">
    <a href="index.html">Home</a>
    <span class="sep">›</span>
    <a href="reisverslagen.html">Reisverslagen</a>
    <span class="sep">›</span>
    <span class="current" id="bc-current">…</span>
</nav>

<main class="article-wrap" id="article"></main>

<footer class="site-footer">
    <div class="footer-inner"></div>
    <div class="footer-bottom"></div>
</footer>

<script src="site-data.js?v=5"></script>
<script src="site.js?v=16"></script>
<script>
    renderHeader('');
    renderFooter();

    function bgImage(spec) {
        const m = (spec || '').match(/^gradient:([^,]+),([^|]+)\|(.+)$/);
        if (!m) return '';
        const [, c1, c2, emoji] = m;
        return `data:image/svg+xml;utf8,${encodeURIComponent(
            `<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='600' viewBox='0 0 1200 600'>
             <defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
             <stop offset='0%' stop-color='${c1}'/><stop offset='100%' stop-color='${c2}'/>
             </linearGradient></defs>
             <rect width='1200' height='600' fill='url(%23g)'/>
             <text x='600' y='380' font-size='240' text-anchor='middle' font-family='system-ui'>${emoji}</text>
             </svg>`)}`;
    }

    const id = parseInt(new URLSearchParams(location.search).get('id'));
    const story = (SITE_DATA.stories || []).find(s => s.id === id);
    const article = document.getElementById('article');

    if (!story) {
        article.innerHTML = `
            <a href="reisverslagen.html" class="article-back">← Alle reisverslagen</a>
            <h1>Reisverslag niet gevonden</h1>
            <p>Dit verslag bestaat (nog) niet. <a href="reisverslagen.html">Bekijk alle verslagen →</a></p>
        `;
        document.getElementById('bc-current').textContent = 'Niet gevonden';
    } else {
        document.title = `${story.title} · Urlaubspotter`;
        document.getElementById('bc-current').textContent = story.title;
        const dateStr = story.date ? new Date(story.date).toLocaleDateString('nl-NL', { year:'numeric', month:'long', day:'numeric' }) : '';
        const paragraphs = (story.content || '').split(/\n\n+/).map(p => `<p>${p.trim()}</p>`).join('');
        article.innerHTML = `
            <a href="reisverslagen.html" class="article-back">← Alle reisverslagen</a>
            <div class="article-hero" style="background-image:url('${bgImage(story.image)}')"></div>
            <div class="article-meta">
                <span class="author">Door ${story.author}</span>
                <span>${dateStr}</span>
            </div>
            <h1>${story.title}</h1>
            <div class="article-body">${paragraphs}</div>
            <section class="related">
                <h3>Meer reisverslagen</h3>
                <div class="editorial-grid" id="related-stories"></div>
            </section>
        `;
        const others = (SITE_DATA.stories || []).filter(s => s.id !== id).slice(0, 3);
        document.getElementById('related-stories').innerHTML = others.map(s => `
            <a class="editorial-card" href="reisverslag-detail.html?id=${s.id}" style="text-decoration:none;color:inherit;">
                <div class="editorial-card-img" style="background:url('${bgImage(s.image)}') center/cover;"></div>
                <div class="editorial-card-body">
                    <span class="editorial-author">Door ${s.author}</span>
                    <h3>${s.title}</h3>
                    <p>${(s.content || '').slice(0, 120)}…</p>
                </div>
            </a>
        `).join('');
    }
</script>
</body>
</html>
